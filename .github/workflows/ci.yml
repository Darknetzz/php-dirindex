name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Build minified artifact
        run: php scripts/build-min.php

      - name: Syntax check
        run: |
          php -l index.php
          php -l index.min.php
