name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Build minified artifact
        run: php scripts/build-min.php

      - name: Syntax check
        run: |
          php -l index.php
          php -l index.min.php

      - name: Package release files
        run: |
          mkdir dist
          cp index.php index.min.php README.md CHANGELOG.md dist/
          cd dist && zip -r "../php-dirindex-${GITHUB_REF_NAME}.zip" .

      - name: Extract release notes from CHANGELOG
        run: |
          scripts/changelog-section.sh "${GITHUB_REF_NAME}" > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "No CHANGELOG section for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/index.php
            dist/index.min.php
            php-dirindex-${{ github.ref_name }}.zip
